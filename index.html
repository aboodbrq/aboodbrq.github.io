<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Abdullah Mofid Yabraq</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- صورة الموقع -->
    <link rel="icon" type="image/png" href="me.jpg">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        /* خلفية السماء الهادئة */
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(to bottom, #cfe9ff, #e8f4ff, #f6fbff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            animation: fadeIn 1.2s ease;
        }

        /* Dark Mode */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(to bottom, #1e2a38, #243447, #2f3e4e);
            }
            .box {
                background: rgba(255,255,255,0.08);
                border: 1px solid rgba(255,255,255,0.15);
            }
            .name, .title-badge {
                color: #fff;
            }
        }

        /* حركة دخول */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* مستطيلات شفافة */
        .box {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(10px);
            padding: 22px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
            animation: fadeIn 1.2s ease;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 14px;
            border: 4px solid rgba(255,255,255,0.7);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .title-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 999px;
            background: rgba(0, 123, 255, 0.85);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 10px;
        }

        .icon-item {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(8px);

            transition: 0.2s ease;
            cursor: pointer;

            /* إزالة الخطوط نهائياً */
            text-decoration: none !important;
        }

        /* إزالة الخطوط من كل الحالات */
        .icon-item,
        .icon-item i,
        .icon-item:link,
        .icon-item:visited,
        .icon-item:hover,
        .icon-item:active {
            text-decoration: none !important;
        }

        .icon-item i {
            font-size: 22px;
        }

        /* حركة عند تمرير الماوس */
        .icon-item:hover {
            transform: translateY(-6px) scale(1.07);
            background: rgba(255, 255, 255, 0.75);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        /* ألوان الأيقونات */
        .phone i { color: #34A853; }
        .email i { color: #EA4335; }
        .whatsapp i { color: #25D366; }
        .snapchat i { color: #FFFC00; }
        .youtube i { color: #FF0000; }
        .facebook i { color: #1877F2; }
        .instagram i { color: #C13584; }
        .tiktok i { color: #000000; }
        .x-twitter i { color: #000000; }
        .threads i { color: #000000; }
        .linkedin i { color: #0A66C2; }

        /* زر حفظ جهة الاتصال */
        .vcf-btn {
            margin-top: 18px;
            padding: 10px 18px;
            background: #007bff;
            color: white;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            display: inline-block;
            text-decoration: none !important;
            transition: 0.2s ease;
        }

        .vcf-btn:hover {
            background: #005fcc;
            transform: scale(1.05);
        }

        /* QR Code */
        .qr-box {
            margin-top: 18px;
        }

        .qr-box img {
            width: 120px;
            border-radius: 12px;
        }

        a { text-decoration: none !important; color: inherit; }

    </style>
</head>
<body>

<div class="container">

    <!-- المستطيل الأول -->
    <div class="box">
        <div class="avatar">
            <img src="me.jpg" alt="Abdullah">
        </div>
        <div class="name">Abdullah Mofid Yabraq</div>
    </div>

    <!-- المستطيل الثاني -->
    <div class="box">
        <div class="title-badge">CEO Manager</div>
    </div>

    <!-- المستطيل الثالث -->
    <div class="box">
        <div class="icons-grid">

            <a class="icon-item phone" href="tel:+966559893115">
                <i class="fa-solid fa-phone"></i>
            </a>

            <a class="icon-item email" href="mailto:aboodbrq@gmail.com">
                <i class="fas fa-envelope"></i>
            </a>

            <a class="icon-item whatsapp" href="https://wa.me/966559893115" target="_blank">
                <i class="fab fa-whatsapp"></i>
            </a>

            <a class="icon-item snapchat" href="https://www.snapchat.com/add/aboodbrq" target="_blank">
                <i class="fab fa-snapchat-ghost"></i>
            </a>

            <a class="icon-item youtube" href="https://www.youtube.com/@mr.abdullahmofidyabraq4260" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>

            <a class="icon-item facebook" href="https://www.facebook.com/share/1Ka16rQadZ/" target="_blank">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a class="icon-item instagram" href="https://www.instagram.com/aboodbrq" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>

            <a class="icon-item tiktok" href="https://www.tiktok.com/@aboodbrq" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>

            <a class="icon-item x-twitter" href="https://x.com/aboodbrq" target="_blank">
                <i class="fab fa-x-twitter"></i>
            </a>

            <a class="icon-item threads" href="https://www.threads.net/@aboodbrq" target="_blank">
                <i class="fa-brands fa-threads"></i>
            </a>

            <a class="icon-item linkedin" href="https://www.linkedin.com/in/abdullah-mofid-yabraq-417a798b" target="_blank">
                <i class="fab fa-linkedin-in"></i>
            </a>

        </div>

        <!-- زر حفظ جهة الاتصال -->
        <a class="vcf-btn" href="contact.vcf" download>Save Contact</a>

        <!-- QR Code -->
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://aboodbrq.github.io/">
        </div>

    </div>

</div>

</body>
</html>
