<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdullah Mofid Yabraq - Digital Card</title>
    <!-- استدعاء الأيقونات -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            /* تم تغيير الخلفية هنا إلى لون السماء الهادئ */
            --bg-color: #e0f2fe; 
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #4b5563;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #e5e7eb;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #0284c7; /* لون متناسق مع خلفية السماء */
        }
        .profile-img i {
            font-size: 50px;
            color: #9ca3af;
        }
        h1 { font-size: 24px; color: var(--text-main); margin-bottom: 8px; }
        p { color: var(--text-sub); font-size: 15px; margin-bottom: 25px; }
        
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, filter 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.9);
        }
        .btn i {
            font-size: 20px;
        }
        .btn-text {
            flex-grow: 1;
            text-align: center;
        }

        /* ألوان المنصات */
        .phone { background-color: #2b3990; }
        .email { background-color: #ea4335; }
        .whatsapp { background-color: #25d366; }
        .snapchat { background-color: #fffc00; color: #000 !important; }
        .youtube { background-color: #ff0000; }
        .facebook { background-color: #1877f2; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .tiktok { background-color: #000000; }
        
        /* زر منصة إكس تم تعديل لون الخط والأيقونة الداخلي إلى الأسود وجعل الخلفية رمادية فاتحة ليتضح النص الأسود */
        .x-platform { background-color: #f3f4f6; color: #000000 !important; border: 1px solid #d1d5db; }
        
        .threads { background-color: #000000; border: 1px solid #333; }
        .linkedin { background-color: #0077b5; }
    </style>
</head>
<body>

<div class="card">
    <div class="profile-img">
        <i class="fa-solid fa-user"></i>
    </div> 
    
    <h1>Abdullah Mofid Yabraq</h1>
    <p>CEO Manager</p>
    
    <div class="links-container">
        <!-- اتصالات مباشر -->
        <a href="tel:+966559893115" class="btn phone">
            <i class="fa-solid fa-phone"></i> <span class="btn-text">اتصال هاتفي</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
        <a href="mailto:aboodbrq@gmail.com" class="btn email">
            <i class="fa-solid fa-envelope"></i> <span class="btn-text">البريد الإلكتروني</span> <i class="fa-solid fa-chevron-left"></i>
        </a>

        <!-- شبكات التواصل الاجتماعي -->
        <a href="https://wa.me" target="_blank" class="btn whatsapp">
            <i class="fa-brands fa-whatsapp"></i> <span class="btn-text">واتساب</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
        <a href="https://snapchat.com" target="_blank" class="btn snapchat">
            <i class="fa-brands fa-snapchat"></i> <span class="btn-text">سناب شات</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
        <a href="https://youtube.com" target="_blank" class="btn youtube">
            <i class="fa-brands fa-youtube"></i> <span class="btn-text">يوتيوب</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
        <a href="https://facebook.com" target="_blank" class="btn facebook">
            <i class="fa-brands fa-facebook-f"></i> <span class="btn-text">فيسبوك</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
        <a href="https://instagram.com" target="_blank" class="btn instagram">
            <i class="fa-brands fa-instagram"></i> <span class="btn-text">انستغرام</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
        <a href="https://tiktok.com" target="_blank" class="btn tiktok">
            <i class="fa-brands fa-tiktok"></i> <span class="btn-text">تيك توك</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
        <a href="https://x.com" target="_blank" class="btn x-platform">
            <i class="fa-brands fa-x-twitter"></i> <span class="btn-text">منصة إكس (X)</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
        <a href="https://threads.net" target="_blank" class="btn threads">
            <i class="fa-brands fa-threads"></i> <span class="btn-text">ثريدز</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
        <a href="https://linkedin.com" target="_blank" class="btn linkedin">
            <i class="fa-brands fa-linkedin-in"></i> <span class="btn-text">لينكد إن</span> <i class="fa-solid fa-chevron-left"></i>
        </a>
    </div>
</div>

</body>
</html>
