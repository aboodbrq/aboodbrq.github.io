<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdullah Mofid Yabraq - CEO Manager</title>
    <!-- رابط مكتبة الأيقونات المحدث والمستقر لضمان ظهور الشعارات فوراً -->
    <link rel="stylesheet" href="https://cloudflare.com" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --sky-gradient: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 50%, #dbeafe 100%);
            --glass-base: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--sky-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .wrapper {
            max-width: 450px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: fadeIn 0.8s ease-out;
        }

        /* التصميم المشترك للمستطيلات الزجاجية الفاخرة */
        .grid-card {
            background: var(--glass-base);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.03);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 1. مستطيل الصورة والاسم فقط */
        .profile-card {
            text-align: center;
            padding: 30px 20px;
        }

        .profile-img-wrapper {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 14px;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            background: #f1f5f9;
        }

        .profile-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            color: var(--text-dark);
            font-weight: 700;
        }

        /* 2. مستطيل المهنة الصغير المستقل */
        .job-card {
            text-align: center;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            color: #0284c7;
            background: rgba(224, 242, 254, 0.7);
            letter-spacing: 0.5px;
        }

        /* 3. المستطيل الأخير الشامل لجميع البيانات */
        .all-links-card {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .social-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-dark);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-row:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            padding-right: 22px;
        }

        /* عرض أيقونة التطبيق الرسمية والملونة بشكل بارز وموسط */
        .app-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: transform 0.3s;
        }

        .app-icon-wrapper i {
            font-size: 20px;
            display: inline-block;
        }

        .social-row:hover .app-icon-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        .arrow-icon {
            font-size: 14px !important;
            color: var(--text-muted);
            opacity: 0.4;
            transition: transform 0.3s;
        }

        .social-row:hover .arrow-icon {
            transform: translateX(-4px);
            opacity: 1;
        }

        /* الألوان الرسمية لأيقونات التطبيقات */
        .ic-phone { color: #1e3a8a; }
        .ic-email { color: #dc2626; }
        .ic-whatsapp { color: #16a34a; }
        .ic-snapchat { color: #eab308; }
        .ic-youtube { color: #cc0000; }
        .ic-facebook { color: #2563eb; }
        .ic-instagram { color: #e1306c; }
        .ic-tiktok { color: #000000; }
        .ic-x { color: #0f172a; }
        .ic-threads { color: #1e293b; }
        .ic-linkedin { color: #0284c7; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- المستطيل الأول: الصورة والاسم فقط -->
    <div class="grid-card profile-card">
        <div class="profile-img-wrapper">
            
        </div>
        <h1>Abdullah Mofid Yabraq</h1>
    </div>

    <!-- المستطيل الثاني الصغير: المهنة فقط -->
    <div class="grid-card job-card">
        CEO Manager
    </div>

    <!-- المستطيل الأخير: الأيقونات الرسمية والأسهم موزعة بشكل سليم ومصلح بالكامل -->
    <div class="grid-card all-links-card">

        <!-- اتصال هاتفي -->
        <a href="tel:+966559893115" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-solid fa-phone ic-phone"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- البريد الإلكتروني -->
        <a href="mailto:aboodbrq@gmail.com" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-solid fa-envelope ic-email"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- واتساب -->
        <a href="https://wa.me" target="_blank" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-brands fa-whatsapp ic-whatsapp"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- سناب شات -->
        <a href="https://snapchat.com" target="_blank" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-brands fa-snapchat ic-snapchat"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- يوتيوب -->
        <a href="https://youtube.com" target="_blank" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-brands fa-youtube ic-youtube"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- فيسبوك -->
        <a href="https://facebook.com" target="_blank" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-brands fa-facebook-f ic-facebook"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- انستغرام -->
        <a href="https://instagram.com" target="_blank" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-brands fa-instagram ic-instagram"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- تيك توك -->
        <a href="https://tiktok.com" target="_blank" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-brands fa-tiktok ic-tiktok"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- منصة إكس -->
        <a href="https://x.com" target="_blank" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-brands fa-x-twitter ic-x"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- ثريدز -->
        <a href="https://threads.net" target="_blank" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-brands fa-threads ic-threads"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>

        <!-- لينكد إن -->
        <a href="https://linkedin.com" target="_blank" class="social-row">
            <div class="app-icon-wrapper"><i class="fa-brands fa-linkedin-in ic-linkedin"></i></div>
            <i class="fa-solid fa-chevron-left arrow-icon"></i>
        </a>
    </div>

</div>

</body>
</html>
