<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Abdullah Mofid Yabraq</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- صورة الموقع (favicon) من GitHub -->
    <link rel="icon" type="image/png" href="me.jpg">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            background: #eef1f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .box {
            background: #ffffff;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 14px;
            border: 4px solid #e5e9f0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            color: #222;
        }

        .title-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 999px;
            background: #007bff;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 10px;
        }

        .icon-item {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f7fb;
            transition: 0.15s ease;
            cursor: pointer;
        }

        .icon-item i {
            font-size: 22px;
        }

        .icon-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
            background: #e8f0ff;
        }

        .phone i { color: #34A853; }
        .email i { color: #EA4335; }
        .whatsapp i { color: #25D366; }
        .snapchat i { color: #FFFC00; }
        .youtube i { color: #FF0000; }
        .facebook i { color: #1877F2; }
        .instagram i { color: #C13584; }
        .tiktok i { color: #000000; }
        .x-twitter i { color: #000000; }
        .threads i { color: #000000; }
        .linkedin i { color: #0A66C2; }

        a { text-decoration: none; }
    </style>
</head>
<body>

<div class="container">

    <!-- المستطيل الأول -->
    <div class="box">
        <div class="avatar">
            <!-- الصورة من GitHub -->
            <img src="me.jpg" alt="Abdullah">
        </div>
        <div class="name">Abdullah Mofid Yabraq</div>
    </div>

    <!-- المستطيل الثاني -->
    <div class="box">
        <div class="title-badge">CEO Manager</div>
    </div>

    <!-- المستطيل الثالث -->
    <div class="box">
        <div class="icons-grid">

            <a class="icon-item phone" href="tel:+9665XXXXXXXX">
                <i class="fa-solid fa-phone"></i>
            </a>

            <a class="icon-item email" href="mailto:example@email.com">
                <i class="fas fa-envelope"></i>
            </a>

            <a class="icon-item whatsapp" href="https://wa.me/9665XXXXXXXX" target="_blank">
                <i class="fab fa-whatsapp"></i>
            </a>

            <a class="icon-item snapchat" href="https://www.snapchat.com/add/USERNAME" target="_blank">
                <i class="fab fa-snapchat-ghost"></i>
            </a>

            <a class="icon-item youtube" href="https://www.youtube.com/@USERNAME" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>

            <a class="icon-item facebook" href="https://www.facebook.com/USERNAME" target="_blank">
                <i class="fab fa-facebook-f"></i>
            </a>

            <a class="icon-item instagram" href="https://www.instagram.com/USERNAME" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>

            <a class="icon-item tiktok" href="https://www.tiktok.com/@USERNAME" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>

            <a class="icon-item x-twitter" href="https://x.com/USERNAME" target="_blank">
                <i class="fab fa-x-twitter"></i>
            </a>

            <a class="icon-item threads" href="https://www.threads.net/@USERNAME" target="_blank">
                <i class="fa-brands fa-threads"></i>
            </a>

            <a class="icon-item linkedin" href="https://www.linkedin.com/in/USERNAME" target="_blank">
                <i class="fab fa-linkedin-in"></i>
            </a>

        </div>
    </div>

</div>

</body>
</html>
