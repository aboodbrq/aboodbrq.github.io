<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdullah Mofid Yabraq - CEO Manager</title>
    <!-- استدعاء الأيقونات الرسمية بنجاح -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --sky-gradient: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 50%, #dbeafe 100%);
            --glass-base: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--sky-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* حاوية الموقع الرئيسية على شكل شبكة احترافية */
        .wrapper {
            max-width: 480px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeIn 0.8s ease-out;
        }

        /* التصميم المشترك للبطاقات الفاخرة */
        .grid-card {
            background: var(--glass-base);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            display: block;
        }

        .grid-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
            background: rgba(255, 255, 255, 0.9);
        }

        /* بطاقة الهوية العلوية الرئيسية */
        .profile-card {
            text-align: center;
            padding: 35px 24px;
        }

        .profile-img-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 16px;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            background: #f1f5f9;
        }

        .profile-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            color: var(--text-dark);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tag {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            color: #0284c7;
            background: #e0f2fe;
            padding: 4px 14px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* شبكة الاتصال السريع المكونة من 3 أعمدة متناسقة */
        .quick-contact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .contact-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            text-align: center;
        }

        .contact-btn i {
            font-size: 22px;
            transition: transform 0.3s;
        }

        /* تأثير التوهج الملون للأيقونات فقط عند مرور الماوس */
        .contact-btn.phone-style i { color: #1e3a8a; }
        .contact-btn.email-style i { color: #dc2626; }
        .contact-btn.whatsapp-style i { color: #16a34a; }

        .contact-btn:hover i {
            transform: scale(1.15);
        }

        /* شبكة منصات التواصل الاجتماعي المتقدمة */
        .social-list-card {
            padding: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin: 8px 12px 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .social-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 16px;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .social-row:hover {
            background: rgba(15, 23, 42, 0.03);
            padding-right: 20px; /* حركة انزلاق بسيطة لليمين تعطي إحساس بالاستجابة */
        }

        .social-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .social-info i {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .arrow-icon {
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.5;
            transition: transform 0.2s;
        }

        .social-row:hover .arrow-icon {
            transform: translateX(-4px);
            opacity: 1;
        }

        /* تخصيص ألوان الأيقونات الفاخرة لكل منصة */
        .ic-snapchat { color: #eab308; }
        .ic-youtube { color: #cc0000; }
        .ic-facebook { color: #2563eb; }
        .ic-instagram { color: #e1306c; }
        .ic-tiktok { color: #000000; }
        .ic-x { color: #0f172a; }
        .ic-threads { color: #1e293b; }
        .ic-linkedin { color: #0284c7; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
