<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بطاقة عبدالله مفيد يبرق</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- استدعاء Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f2f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            width: 360px;
            padding: 24px 24px 28px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 16px;
            border: 4px solid #e5e9f0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #222;
        }

        .title-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            background: #007bff;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-top: 4px;
        }

        .icon-item {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f7fb;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
            cursor: pointer;
        }

        .icon-item i {
            font-size: 22px;
            color: #222;
        }

        .icon-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
            background: #e8f0ff;
        }

        /* ألوان مخصصة لبعض الأيقونات */
        .snapchat i { color: #FFFC00; }
        .whatsapp i { color: #25D366; }
        .email i { color: #EA4335; }
        .phone i { color: #34A853; }
        .tiktok i { color: #000000; }
        .instagram i { color: #C13584; }
        .facebook i { color: #1877F2; }
        .youtube i { color: #FF0000; }
        .linkedin i { color: #0A66C2; }
        .x-twitter i { color: #000000; }
        .website i { color: #555555; }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar">
        <!-- استبدل src بصورة شخصية لك -->
        <img src="https://via.placeholder.com/300x300.png?text=Abdullah" alt="Abdullah Mofid Yabraq">
    </div>

    <div class="name">Abdullah Mofid Yabraq</div>
    <div class="title-badge">CEO Manager</div>

    <div class="icons-grid">
        <!-- Snapchat -->
        <a class="icon-item snapchat" href="https://www.snapchat.com/add/USERNAME" target="_blank" aria-label="Snapchat">
            <i class="fab fa-snapchat-ghost"></i>
        </a>

        <!-- WhatsApp -->
        <a class="icon-item whatsapp" href="https://wa.me/9665XXXXXXXX" target="_blank" aria-label="WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>

        <!-- Email -->
        <a class="icon-item email" href="mailto:example@email.com" aria-label="Email">
            <i class="fas fa-envelope"></i>
        </a>

        <!-- Phone -->
        <a class="icon-item phone" href="tel:+9665XXXXXXXX" aria-label="Phone">
            <i class="fas fa-phone"></i>
        </a>

        <!-- TikTok -->
        <a class="icon-item tiktok" href="https://www.tiktok.com/@USERNAME" target="_blank" aria-label="TikTok">
            <i class="fab fa-tiktok"></i>
        </a>

        <!-- Instagram -->
        <a class="icon-item instagram" href="https://www.instagram.com/USERNAME" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>

        <!-- Facebook -->
        <a class="icon-item facebook" href="https://www.facebook.com/USERNAME" target="_blank" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
        </a>

        <!-- YouTube -->
        <a class="icon-item youtube" href="https://www.youtube.com/@USERNAME" target="_blank" aria-label="YouTube">
            <i class="fab fa-youtube"></i>
        </a>

        <!-- LinkedIn -->
        <a class="icon-item linkedin" href="https://www.linkedin.com/in/USERNAME" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin-in"></i>
        </a>

        <!-- X (Twitter سابقاً) -->
        <a class="icon-item x-twitter" href="https://x.com/USERNAME" target="_blank" aria-label="X">
            <i class="fab fa-x-twitter"></i>
        </a>

        <!-- Website -->
        <a class="icon-item website" href="https://www.example.com" target="_blank" aria-label="Website">
            <i class="fas fa-globe"></i>
        </a>

        <!-- أيقونة إضافية (مثلاً رابط ثانٍ لموقع أو خدمة أخرى) -->
        <a class="icon-item website" href="https://www.example2.com" target="_blank" aria-label="Website 2">
            <i class="fas fa-link"></i>
        </a>
    </div>
</div>

</body>
</html>
