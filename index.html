    <style>
        :root {
            --sky-gradient: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 50%, #dbeafe 100%);
            --glass-base: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--sky-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .wrapper {
            max-width: 450px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: fadeIn 0.8s ease-out;
        }

        .grid-card {
            background: var(--glass-base);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.03);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .profile-card {
            text-align: center;
            padding: 30px 20px;
        }

        .profile-img-wrapper {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 14px;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            background: #f1f5f9;
        }

        .profile-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .job-card {
            text-align: center;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            color: #0284c7;
            background: rgba(224, 242, 254, 0.7);
            letter-spacing: 0.5px;
        }

        .all-links-card {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .social-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 14px;
            color: var(--text-dark);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-row:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            padding-right: 22px;
        }

        .app-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: transform 0.3s;
        }

        .app-icon-wrapper svg {
            width: 22px;
            height: 22px;
            display: block;
        }

        .social-row:hover .app-icon-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        .arrow-icon-svg {
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
            opacity: 0.4;
            transition: transform 0.3s, opacity 0.3s;
        }

        .social-row:hover .arrow-icon-svg {
            transform: translateX(-4px);
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
